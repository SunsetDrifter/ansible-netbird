---
# Phase 1 — Pre-flight: canonicalise configure_config_dir, confirm it exists, and
# include every YAML file the role needs into the play scope.
#
# Input validation is declared in meta/argument_specs.yml — Ansible
# raises before any task runs if a required input is missing.
#
# `include_vars: dir:` resolves relative paths against the role's vars/
# directory rather than the playbook CWD, so a relative configure_config_dir blows
# up the access_control / dns loads. Canonicalize once and route every
# downstream reference through `_config_dir_abs` — a `set_fact` cannot
# override the role's `configure_config_dir` input because `include_role: vars:`
# has higher precedence, so a separate fact name is required.

- name: Normalize configure_config_dir to absolute path
  ansible.builtin.set_fact:
    _config_dir_abs: "{{ configure_config_dir | expanduser | realpath }}"

- name: Display target environment
  ansible.builtin.debug:
    msg: >-
      NetBird {{ _config_dir_abs | basename | upper }} —
      {{ 'APPLY MODE' if configure_commit | bool else 'PREVIEW MODE (read-only, no changes)' }}{{ ' + STRICT (unmanaged resources will be removed)' if configure_strict | bool else '' }}
      — config from {{ _config_dir_abs }}/

- name: Check config directory exists
  ansible.builtin.stat:
    path: "{{ _config_dir_abs }}"
  register: config_dir_stat
  delegate_to: localhost

- name: Fail if config directory doesn't exist
  ansible.builtin.fail:
    msg: "Config directory not found: {{ _config_dir_abs }}"
  when: not config_dir_stat.stat.exists

# =========================================================================
# Load all configuration files. Every leaf-file include is gated by a
# stat-then-include pattern so a minimal configure_config_dir (e.g. only
# access_control/groups.yml) is valid. The two `dir:` includes still
# error if the directory itself is missing — by design, those subtrees
# are mandatory.
# =========================================================================
- name: Stat optional leaf config files
  ansible.builtin.stat:
    path: "{{ _config_dir_abs }}/{{ item }}"
  register: _config_file_stats
  delegate_to: localhost
  loop:
    - settings.yml
    - networks.yml
    - setup_keys.yml
  loop_control:
    label: "{{ item }}"

- name: Load settings
  ansible.builtin.include_vars:
    file: "{{ _config_dir_abs }}/settings.yml"
  when: _config_file_stats.results[0].stat.exists

- name: Load access control (groups, posture checks, policies)
  ansible.builtin.include_vars:
    dir: "{{ _config_dir_abs }}/access_control"
    extensions: ['yml', 'yaml']

- name: Load DNS configuration (nameservers, zones, settings)
  ansible.builtin.include_vars:
    dir: "{{ _config_dir_abs }}/dns"
    extensions: ['yml', 'yaml']

- name: Load networks
  ansible.builtin.include_vars:
    file: "{{ _config_dir_abs }}/networks.yml"
  when: _config_file_stats.results[1].stat.exists

- name: Load setup keys
  ansible.builtin.include_vars:
    file: "{{ _config_dir_abs }}/setup_keys.yml"
  when: _config_file_stats.results[2].stat.exists

- name: Display configuration summary
  ansible.builtin.debug:
    msg:
      - "Configuration loaded from: {{ _config_dir_abs }}/"
      - "  Settings:         {{ 'configured' if netbird_settings | default({}) | length > 0 else 'empty' }}"
      - "  Groups:           {{ netbird_groups | default([]) | length }}"
      - "  Posture checks:   {{ netbird_posture_checks | default([]) | length }}"
      - "  Policies:         {{ netbird_policies | default([]) | length }}"
      - "  Setup keys:       {{ netbird_setup_keys | default([]) | length }}"
      - "  DNS nameservers:  {{ netbird_dns_nameserver_groups | default([]) | length }}"
      - "  DNS zones:        {{ netbird_dns_zones | default([]) | length }}"
      - "  Networks:         {{ netbird_networks | default([]) | length }}"
