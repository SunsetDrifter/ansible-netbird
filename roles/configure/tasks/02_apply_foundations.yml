---
# Phase 2 — Foundations (commit-mode only): resources every dependent
# resource references. Applied before ID resolution so name→ID maps
# pick up just-created items.
#
# Note: account settings used to live here but the JWT/expose/traffic-
# logs-groups fields reference group_ids, which is not built until
# phase 3. Settings have been moved to phase 4 (after resolve_ids) to
# avoid an UndefinedError when those fields are populated.

- name: Apply foundational resources (commit mode)
  when: commit | bool
  block:
    - name: Manage posture checks
      community.ansible_netbird.netbird_posture_check:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        checks: "{{ item.checks }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ netbird_posture_checks | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: netbird_posture_checks | default([]) | length > 0
      tags:
        - configure-posture-checks

    - name: Manage groups
      community.ansible_netbird.netbird_group:
        name: "{{ item.name }}"
        peers: "{{ item.peers | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ netbird_groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: netbird_groups | default([]) | length > 0
      tags:
        - configure-groups
