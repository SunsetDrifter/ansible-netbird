---
# Role: community.ansible_netbird.configure
#
# Applies NetBird logical configuration from YAML files via the NetBird REST API.
# Manages groups, policies, networks, DNS (nameservers + zones), posture checks,
# and account settings.
#
# Runs in preview mode by default — shows a read-only diff of what would change.
# Set configure_commit=true to apply; configure_strict=true to remove resources not defined in YAML.
#
# Execution order (respects dependencies):
#   1. Account settings    (no dependencies)
#   2. Posture checks      (no dependencies, needed by policies)
#   3. Groups              (no dependencies, needed by everything else)
#   4. Setup keys          (depend on groups for auto_groups)
#   5. DNS                 (depend on groups)
#   6. Networks            (depend on groups)
#   7. Policies            (depend on groups + posture checks)
#
# Inputs are declared and validated in meta/argument_specs.yml. See
# roles/configure/README.md for the full input matrix and configure_config_dir layout.

# Pre-flight runs outside the API block — it does not call the NetBird API
# and so does not need module_defaults.
- name: Pre-flight validation and config loading
  ansible.builtin.import_tasks: 01_validate_and_load.yml
  tags:
    - configure
    - configure-validate

# All NetBird API tasks live under a single block so module_defaults can
# inject api_url / api_token / validate_certs in one place. The defaults
# stay at *block* level (not play level) because ansible-core 2.15 resolves
# play-level module_defaults referencing group_vars before group_vars are
# loaded — see CLAUDE.md "Important Patterns" in the testing repo.
- name: Configure NetBird resources
  tags:
    - configure
  module_defaults:
    group/community.ansible_netbird.netbird:
      api_url: "{{ netbird_api_url }}"
      api_token: "{{ netbird_api_token }}"
      validate_certs: "{{ netbird_validate_certs }}"
  block:
    - name: Apply foundational resources
      ansible.builtin.import_tasks: 02_apply_foundations.yml

    - name: Fetch state and resolve IDs
      ansible.builtin.import_tasks: 03_resolve_ids.yml
      tags:
        - configure-resolve

    - name: Apply dependent resources or render preview
      ansible.builtin.import_tasks: 04_apply_dependents.yml

    - name: Strict-mode cleanup
      ansible.builtin.import_tasks: 05_strict_cleanup.yml

    - name: Configuration complete
      ansible.builtin.debug:
        msg: "NetBird configuration applied successfully from {{ _config_dir_abs }}/"
      when: configure_commit | bool
