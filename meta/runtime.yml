---
# Minimum ansible-core version. The testing harness in
# ansible-netbird-testing runs against ansible-core 2.15.x, so that is the
# floor we exercise; older cores may work but are not under test.
requires_ansible: ">=2.15.0"

action_groups:
  netbird:
    - netbird_account
    - netbird_dns
    - netbird_dns_zone
    - netbird_group
    - netbird_idp
    - netbird_info
    - netbird_invite
    - netbird_network
    - netbird_peer
    - netbird_policy
    - netbird_posture_check
    - netbird_route
    - netbird_setup_key
    - netbird_token
    - netbird_user
