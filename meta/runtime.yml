---
action_groups:
  netbird:
    - netbird_account
    - netbird_dns
    - netbird_dns_zone
    - netbird_group
    - netbird_idp
    - netbird_info
    - netbird_invite
    - netbird_network
    - netbird_peer
    - netbird_policy
    - netbird_posture_check
    - netbird_route
    - netbird_setup_key
    - netbird_token
    - netbird_user

plugin_routing:
  modules:
    netbird_route:
      deprecation:
        removal_version: 3.0.0
        warning_text: >-
          The deprecated /api/routes endpoint is superseded by
          /api/networks/{id}/routers and /api/networks/{id}/resources.
          Use community.ansible_netbird.netbird_network with the
          O(routers)/O(resources) options instead.
